<style>

</style>

<body>

<div class="container">

    <input type="text" id="mesec" placeholder="Mesec & Leto">

  <div style="padding:20px; text-align:center;">

<!-- Scanner -->
<div id="scannerDiv" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center;">
  <div style="width:92%; max-width:520px;">
    <video id="video" autoplay muted playsinline style="width:100%; border-radius:12px; background:#000;"></video>
    <button class="btn btn-primary" onclick="stopScanner()" style="width:100%; margin-top:15px;">Ustavi skener</button>
  </div>

<!-- Edit Modal in History Modal (enaka kot prej) -->
<!-- ... (lahko jih dodaš iz prejšnje verzije, če jih nimaš) ... -->

<div class="toast" id="toast" style="display:none;"></div>

<script>
// ==================== PARSER (enak kot prej) ====================
function parseUDI(code) {
  if (!code || code.length < 5) return { name: "Neveljavna koda", manufacturer: "Neznan", lot: "", sn: "", expiry: "", ref: "" };

  let r = { name: "Medicinski pripomoček", manufacturer: "Neznan proizvajalec", lot: "", sn: "", expiry: "", ref: "", gtin: "" };
  const lower = code.toLowerCase();

  const gs1 = /\((\d{2})\)([^()]+)/g;
  let m;
  while ((m = gs1.exec(code)) !== null) {
    const ai = m[1], val = m[2].trim();
    if (ai === '01') r.gtin = val;
    if (ai === '10') r.lot = val;
    if (ai === '17' && val.length >= 6) r.expiry = `20${val.slice(0,2)}-${val.slice(2,4)}-${val.slice(4,6)}`;
    if (ai === '21') r.sn = val;
  }

  if (!r.gtin) { const g = code.match(/01(\d{12,14})/); if (g) r.gtin = g[1]; }
  if (!r.lot) { const l = code.match(/10([A-Z0-9-]+)/i); if (l) r.lot = l[1]; }
  if (!r.sn) { const s = code.match(/21([A-Z0-9-]+)/i); if (s) r.sn = s[1]; }
  if (!r.expiry) { 
    const e = code.match(/17(\d{6})/); 
    if (e) r.expiry = `20${e[1].slice(0,2)}-${e[1].slice(2,4)}-${e[1].slice(4,6)}`; 
  }

  const refMatch = code.match(/REF[:\s]*([A-Z0-9-]+)/i) || code.match(/([A-Z]{2,}-\d{3,}[A-Z0-9-]*)/);
  if (refMatch) r.ref = refMatch[1] || refMatch[0];

  // Proizvajalci ...
  if (lower.includes('3m') || lower.includes('espe') || lower.includes('filtek')) {
    r.manufacturer = "3M ESPE";
    r.name = lower.includes('filtek') ? "Filtek Universal Restorative" : "3M Dental Material";
  } else if (lower.includes('ivoclar') || lower.includes('vivadent')) {
    r.manufacturer = "Ivoclar Vivadent"; r.name = "Ivoclar Material";
  } else if (lower.includes('dentsply') || lower.includes('sirona')) {
    r.manufacturer = "Dentsply Sirona"; r.name = "Dentsply Sirona Material";
  } // ... dodaj ostale po potrebi

  if (r.manufacturer === "Neznan proizvajalec") {
    r.name = r.ref ? `Material REF: ${r.ref}` : `Material (${code.substring(0,30)}...)`;
  }
  return r;
}

let currentItems = [];
let currentEditIndex = -1;
let db;

// ... (ostale funkcije: openDB, saveControls, loadSavedControls, renderTable, toggle, editItem, saveEdit, newControl, exportJSON, importJSON, showHistory itd. ostanejo enake kot v prejšnji delujoči verziji)

// POPRAVLJEN SCANNER ZA ANDROID
let codeReader = null;
async function toggleScanner() {
  document.getElementById('scannerDiv').style.display = 'flex';
  
  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    
    const devices = await codeReader.listVideoInputDevices();
    let deviceId = null;

    // Poskusi izbrati zadnjo kamero
    for (const device of devices) {
      if (device.label.toLowerCase().includes('back') || device.label.toLowerCase().includes('rear')) {
        deviceId = device.deviceId;
        break;
      }
    }
    if (!deviceId && devices.length > 0) deviceId = devices[devices.length-1].deviceId;

    await codeReader.decodeFromVideoDevice(deviceId, 'video', (result) => {
      if (result) {
        addItem(result.getText());
        stopScanner();
      }
    });

    showToast("Kamera vključena – usmeri na kodo");
  } catch(e) {
    console.error("Scanner error:", e);
    showToast("Napaka pri zagonu kamere. Preveri dovoljenja za kamero v nastavitvah brskalnika.");
    stopScanner();
  }
}

function stopScanner() {
  if (codeReader) {
    codeReader.reset();
    codeReader = null;
  }
  document.getElementById('scannerDiv').style.display = 'none';
}

function showManual() {
  addItem("");
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// PWA + start
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

window.onload = () => {
  openDB();
  showToast("Skeniranje popravljeno – poskusi znova");
};
</script>
